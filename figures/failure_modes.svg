<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300"><style>text{font-family:Arial,sans-serif;fill:#172033}.card{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:10}.bad{fill:#fff1f2}.fix{fill:#eff6ff}.h{font-size:20px;font-weight:700}.s{font-size:15px}</style><rect x="30" y="45" width="250" height="210" class="card bad"/><text x="155" y="85" text-anchor="middle" class="h">Wrong object</text><text x="155" y="125" text-anchor="middle" class="s">take unrelated item</text><text x="155" y="155" text-anchor="middle" class="s">carry it across rooms</text><text x="155" y="205" text-anchor="middle" class="s">Guard: block or drop</text><rect x="325" y="45" width="250" height="210" class="card bad"/><text x="450" y="85" text-anchor="middle" class="h">Stage drift</text><text x="450" y="125" text-anchor="middle" class="s">search after holding target</text><text x="450" y="155" text-anchor="middle" class="s">place before operation</text><text x="450" y="205" text-anchor="middle" class="s">Controller: redirect</text><rect x="620" y="45" width="250" height="210" class="card fix"/><text x="745" y="85" text-anchor="middle" class="h">Undo progress</text><text x="745" y="125" text-anchor="middle" class="s">take placed item back</text><text x="745" y="155" text-anchor="middle" class="s">loop around destination</text><text x="745" y="205" text-anchor="middle" class="s">State: remember progress</text></svg>
